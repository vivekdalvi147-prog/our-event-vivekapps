<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Events | Premium Event Booking</title>
    
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons (No emojis as requested) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- jsPDF Library for generating Colorful PDF Tickets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* Base Variables and Glassmorphism Theme - Highly Modernized */
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050508;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(0, 243, 255, 0.2);
            --glass-highlight: rgba(188, 19, 254, 0.3);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, rgba(188, 19, 254, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 243, 255, 0.05), transparent 40%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glass Panel Utility */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Neon Text Gradient */
        .neon-text {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Modern Neon Buttons */
        .btn-neon {
            background: transparent;
            color: white;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            border-radius: 50px;
            padding: 10px 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .btn-neon:hover {
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px rgba(0, 243, 255, 0.4);
            transform: translateY(-2px);
            background: rgba(0, 243, 255, 0.1);
        }
        
        .btn-neon.purple {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.2);
        }
        .btn-neon.purple:hover {
            box-shadow: 0 0 20px var(--neon-purple), inset 0 0 10px rgba(188, 19, 254, 0.4);
            background: rgba(188, 19, 254, 0.1);
        }

        /* Round Progress Bar (Loader) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; transition: opacity 0.5s;
        }
        
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(0, 243, 255, 0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Support Chatbot Widget */
        #chatbot-widget {
            position: fixed; bottom: 80px; right: 20px; z-index: 1000;
            width: 350px; display: none;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }
        
        .chat-msg { margin: 10px; padding: 12px; border-radius: 12px; max-width: 85%; font-size: 0.9rem; line-height: 1.4;}
        .bot-msg { background: rgba(0,243,255,0.05); border: 1px solid var(--glass-border); align-self: flex-start; border-bottom-left-radius: 2px;}
        .user-msg { background: rgba(188,19,254,0.1); border: 1px solid var(--glass-highlight); align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px;}
        
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
        
        .hidden { display: none !important; }
        .section-container { min-height: calc(100vh - 160px); padding-top: 100px; padding-bottom: 40px; }
        
        /* Specific Fix: Table formatting for Admin Panel */
        table { width: 100%; border-collapse: collapse; margin-top: 10px;}
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: var(--neon-blue); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;}

        /* Main app content wrapper to push footer down */
        #app-content { flex: 1; }

        /* Footer styling */
        footer {
            background: rgba(0,0,0,0.8);
            border-top: 1px solid var(--glass-border);
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #888;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <!-- Initial Page Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <h2 class="mt-4 neon-text font-bold text-xl tracking-widest uppercase">Initializing...</h2>
    </div>

    <!-- Top Navigation Bar (Fixed Logo Wrapping Issue) -->
    <nav class="fixed w-full z-50 glass-panel border-0 border-b rounded-none px-4 md:px-8 py-4 flex justify-between items-center bg-[rgba(5,5,8,0.85)]">
        <!-- FIXED: Added whitespace-nowrap and flex-shrink-0 to guarantee single line display -->
        <h1 class="text-xl md:text-2xl font-black tracking-wider neon-text cursor-pointer flex items-center whitespace-nowrap flex-shrink-0" onclick="navigate('home')">
            <i class="fa-solid fa-calendar-check mr-3"></i>OUR EVENTS
        </h1>
        <div class="flex gap-4 items-center">
            <button class="text-gray-400 hover:text-white hover:scale-110 transition duration-300" onclick="navigate('settings')">
                <i class="fa-solid fa-gear text-xl"></i>
            </button>
            <div id="auth-nav-area">
                <!-- Login/Dashboard button injected here dynamically -->
            </div>
        </div>
    </nav>

    <!-- Main Dynamic Content Area -->
    <main id="app-content"></main>

    <!-- Professional Footer Section Added -->
    <footer>
        <div class="flex justify-center gap-4 mb-4 text-[#00f3ff]">
            <i class="fa-brands fa-twitter cursor-pointer hover:text-white transition"></i>
            <i class="fa-brands fa-instagram cursor-pointer hover:text-white transition"></i>
            <i class="fa-brands fa-linkedin cursor-pointer hover:text-white transition"></i>
        </div>
        &copy; 2026 Our Events. All rights reserved.
        <p class="text-xs mt-2 text-gray-600">Premium Ticketing Platform designed for exclusive experiences.</p>
    </footer>

    <!-- Floating Support Chatbot Toggle Button -->
    <button onclick="toggleChatbot()" class="fixed bottom-6 right-6 btn-neon !p-4 !rounded-full z-40 shadow-[0_0_20px_rgba(0,243,255,0.3)]">
        <i class="fa-solid fa-headset text-2xl"></i>
    </button>

    <!-- Support Chatbot Window -->
    <div id="chatbot-widget" class="glass-panel flex-col h-[500px]">
        <div class="p-4 border-b border-[rgba(0,243,255,0.2)] flex justify-between items-center bg-[rgba(0,0,0,0.6)] rounded-t-[16px]">
            <h3 class="font-bold flex items-center text-[#00f3ff]"><i class="fa-solid fa-robot mr-2 text-xl"></i> Support Bot</h3>
            <button onclick="toggleChatbot()" class="hover:text-red-400 transition text-lg"><i class="fa-solid fa-times"></i></button>
        </div>
        <div id="chat-body" class="flex-1 overflow-y-auto p-3 flex flex-col gap-2">
            <div class="chat-msg bot-msg shadow-lg"><i class="fa-solid fa-wave-square mr-2"></i> Hello! Type "hi" to start or select an issue below.</div>
        </div>
        <div id="chat-options" class="p-3 grid grid-cols-1 gap-2 border-t border-[rgba(0,243,255,0.2)] bg-black/40">
            <button class="btn-neon !text-xs !py-2 w-full justify-start" onclick="handleChatOption('Payment Issue')"><i class="fa-solid fa-credit-card"></i> Payment Issue</button>
            <button class="btn-neon !text-xs !py-2 w-full justify-start" onclick="handleChatOption('Ticket not received')"><i class="fa-solid fa-ticket"></i> Ticket not received</button>
            <button class="btn-neon purple !text-xs !py-2 w-full justify-start" onclick="handleChatOption('Other')"><i class="fa-solid fa-circle-question"></i> Other</button>
        </div>
        <div id="chat-input-area" class="p-3 hidden flex gap-2 bg-black/60 rounded-b-[16px]">
            <input type="text" id="chatInput" class="w-full bg-black/80 border border-[rgba(0,243,255,0.3)] rounded-lg p-3 text-sm outline-none focus:border-[#00f3ff] transition text-white" placeholder="Type your message...">
            <button onclick="sendChatMessage()" class="btn-neon !px-4 !py-3 rounded-lg"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Authentication Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex justify-center items-center">
        <div class="glass-panel w-[90%] max-w-md p-8 relative border-t-4 border-t-[#00f3ff]">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl transition"><i class="fa-solid fa-times"></i></button>
            <div class="text-center mb-6">
                <i class="fa-solid fa-user-shield text-4xl text-[#00f3ff] mb-4"></i>
                <h2 id="auth-title" class="text-3xl font-bold neon-text">Secure Login</h2>
            </div>
            
            <div class="space-y-4 mb-6">
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="email" id="auth-email" placeholder="Email Address" class="w-full bg-black/50 border border-gray-600 rounded-lg py-3 pl-12 pr-4 outline-none focus:border-[#00f3ff] focus:shadow-[0_0_10px_rgba(0,243,255,0.2)] transition text-white">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-black/50 border border-gray-600 rounded-lg py-3 pl-12 pr-4 outline-none focus:border-[#00f3ff] focus:shadow-[0_0_10px_rgba(0,243,255,0.2)] transition text-white">
                </div>
            </div>
            
            <button id="auth-action-btn" onclick="handleEmailAuth()" class="btn-neon w-full justify-center text-lg py-3 mb-6 shadow-[0_0_15px_rgba(0,243,255,0.3)]">Authenticate</button>
            
            <div class="flex items-center gap-4 mb-6">
                <div class="flex-1 border-t border-gray-700"></div>
                <div class="text-gray-500 font-bold text-sm">OR</div>
                <div class="flex-1 border-t border-gray-700"></div>
            </div>
            
            <button onclick="handleGoogleLogin()" class="w-full bg-white text-black font-bold rounded-lg p-3 mb-6 flex items-center justify-center gap-3 hover:bg-gray-200 transition shadow-lg">
                <i class="fa-brands fa-google text-red-500 text-xl"></i> Continue with Google
            </button>
            
            <p class="text-center text-sm text-gray-400 cursor-pointer hover:text-[#00f3ff] transition font-semibold" onclick="toggleAuthMode()" id="auth-toggle-text">New User? Create an account</p>
        </div>
    </div>

    <!-- Firebase SDKs (v8 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        // Highly Secure Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAbWud5zRj5Df5Ur55iTwuAUdcHSCKBU0U",
            authDomain: "our-event-vivekapps.firebaseapp.com",
            projectId: "our-event-vivekapps",
            storageBucket: "our-event-vivekapps.firebasestorage.app",
            messagingSenderId: "15973302901",
            appId: "1:15973302901:web:78d2c33e83f3161c47ae3c"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Admin Identity Checks & Constants
        const ADMIN_EMAIL = 'admin@ourevents.com';
        const SUPPORT_EMAIL = "vivekdalvi147@gmail.com"; 

        // Global State Management
        let currentUser = null;
        let isLoginMode = true;
        let eventsList =[];
        let intendedPurchase = null;

        // Initialize App UI
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1200);
            fetchEvents();
            navigate('home');
        };

        // Listen for Authentication State
        auth.onAuthStateChanged((user) => {
            currentUser = user;
            const navArea = document.getElementById('auth-nav-area');
            if(user) {
                navArea.innerHTML = `
                    <button onclick="navigate('dashboard')" class="btn-neon !px-5 !py-2 !text-sm font-bold shadow-md"><i class="fa-solid fa-user-astronaut"></i> Dashboard</button>
                `;
                // Resume pending purchase logic
                if(intendedPurchase) {
                    processPurchase(intendedPurchase);
                    intendedPurchase = null;
                }
            } else {
                navArea.innerHTML = `
                    <button onclick="openAuthModal()" class="btn-neon !px-5 !py-2 !text-sm font-bold shadow-md"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
                `;
            }
        });

        // =========================================
        // CORE NAVIGATION ROUTER
        // =========================================
        function navigate(view, data = null) {
            const app = document.getElementById('app-content');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if(view === 'home') renderHome(app);
            else if(view === 'dashboard') renderDashboard(app);
            else if(view === 'admin') renderAdmin(app);
            else if(view === 'settings') renderSettings(app);
            else if(view === 'eventDetails') renderEventDetails(app, data);
        }

        // =========================================
        // 1. HOME VIEW & 30+ EXTRA SECTIONS
        // =========================================
        function renderHome(container) {
            let html = `
                <!-- Hero Section (Optimized for performance) -->
                <div class="relative w-full h-[90vh] flex items-center justify-center text-center px-4 overflow-hidden">
                    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30')] bg-cover bg-fixed bg-center opacity-40"></div>
                    <div class="absolute inset-0 bg-gradient-to-t from-[#050508] via-transparent to-[#050508]/80"></div>
                    <div class="z-10 max-w-4xl glass-panel p-12 border-t-2 border-t-[#bc13fe]">
                        <h1 class="text-6xl md:text-8xl font-black mb-6 neon-text tracking-tighter uppercase drop-shadow-2xl">Discover<br>Our Events</h1>
                        <p class="mb-10 text-gray-300 text-xl font-light">The ultimate futuristic ticketing platform for premium global experiences.</p>
                        <button onclick="document.getElementById('events-grid').scrollIntoView({behavior:'smooth'})" class="btn-neon text-xl font-bold py-4 px-10 shadow-[0_0_30px_rgba(0,243,255,0.4)]">
                            <i class="fa-solid fa-ticket-simple mr-2"></i> Explore Upcoming
                        </button>
                    </div>
                </div>
                
                <div class="max-w-7xl mx-auto px-6 py-16">
                    <div class="flex items-center justify-between border-b border-[rgba(0,243,255,0.3)] pb-6 mb-10">
                        <h2 class="text-4xl font-black uppercase tracking-wider"><i class="fa-solid fa-fire text-orange-500 mr-3"></i> Trending Events</h2>
                        <span class="text-[#00f3ff] font-bold text-sm cursor-pointer hover:underline">View All <i class="fa-solid fa-arrow-right"></i></span>
                    </div>
                    <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                        <div class="flex justify-center w-full col-span-full py-20"><div class="spinner"></div></div>
                    </div>
                </div>
            `;

            // Dummy Sections generated systematically
            const extraSections =[
                {id:"about", title:"About the Event", icon:"fa-info-circle"}, {id:"schedule", title:"Schedule / Agenda", icon:"fa-clock"},
                {id:"speakers", title:"Speakers / Performers", icon:"fa-users"}, {id:"gallery", title:"Gallery", icon:"fa-images"},
                {id:"sponsors", title:"Sponsors & Partners", icon:"fa-handshake"}, {id:"pricing", title:"Pricing Details", icon:"fa-tags"},
                {id:"venue", title:"Venue & Travel", icon:"fa-map-location-dot"}, {id:"accommodation", title:"Hotels & Stay", icon:"fa-bed"},
                {id:"registration", title:"Registration Details", icon:"fa-clipboard-list"}, {id:"faq", title:"FAQ", icon:"fa-question-circle"},
                {id:"refund", title:"Refund Policy", icon:"fa-money-bill-transfer"}, {id:"press", title:"Press & Media", icon:"fa-camera"}
            ];

            html += `<div class="bg-black/40 py-16"><div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">`;
            extraSections.forEach(sec => {
                html += `
                <div class="glass-panel p-6 hover:-translate-y-2 hover:border-[#bc13fe] transition duration-300 cursor-pointer group">
                    <h3 class="text-lg font-bold text-white mb-2 group-hover:text-[#bc13fe] transition"><i class="fa-solid ${sec.icon} mr-2 text-[#00f3ff]"></i> ${sec.title}</h3>
                    <p class="text-xs text-gray-500">Explore comprehensive details regarding ${sec.title.toLowerCase()}.</p>
                </div>`;
            });
            html += `</div></div>`;

            container.innerHTML = html;
            if(eventsList.length > 0) renderEventsGrid();
        }

        async function fetchEvents() {
            try {
                const snapshot = await db.collection('events').get();
                eventsList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderEventsGrid();
            } catch (error) {
                console.error("Error fetching events: ", error);
            }
        }

        function renderEventsGrid() {
            const grid = document.getElementById('events-grid');
            if(!grid) return;
            if(eventsList.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-gray-400 py-10 bg-black/50 rounded-lg border border-gray-800">No events currently scheduled. Check back later!</div>`;
                return;
            }

            let html = '';
            eventsList.forEach(ev => {
                const img = ev.images && ev.images.length > 0 ? ev.images[0] : 'https://images.unsplash.com/photo-1540575467063-178a50c2df87';
                html += `
                <div class="glass-panel overflow-hidden flex flex-col group relative cursor-pointer border-transparent hover:border-[#00f3ff]" onclick="navigate('eventDetails', '${ev.id}')">
                    <div class="h-56 w-full bg-cover bg-center transition duration-700 group-hover:scale-110" style="background-image: url('${img}')">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col relative z-10 bg-[rgba(5,5,8,0.95)] -mt-10 rounded-t-3xl border-t border-gray-800">
                        <span class="bg-[#bc13fe] text-white text-[10px] font-bold px-3 py-1 rounded-full w-fit mb-3 shadow-[0_0_10px_rgba(188,19,254,0.5)]">PREMIUM</span>
                        <h3 class="text-2xl font-black mb-2 uppercase tracking-wide text-white group-hover:text-[#00f3ff] transition">${ev.title}</h3>
                        
                        <div class="mt-auto pt-6">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <p class="text-gray-500 text-xs uppercase mb-1 font-bold">Ticket Price</p>
                                    <span class="text-gray-500 line-through text-sm mr-2">₹${ev.price}</span>
                                    <span class="text-[#00f3ff] font-black text-3xl">₹${ev.discountPrice}</span>
                                </div>
                            </div>
                            <button onclick="event.stopPropagation(); navigate('eventDetails', '${ev.id}')" class="btn-neon w-full justify-center py-3 text-lg bg-[#00f3ff]/10">
                                <i class="fa-solid fa-bolt"></i> Get Tickets
                            </button>
                        </div>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        // =========================================
        // 2. EVENT DETAILS & WISHLIST INTEGRATION
        // =========================================
        async function renderEventDetails(container, eventId) {
            const ev = eventsList.find(e => e.id === eventId);
            if(!ev) return navigate('home');

            // Check wishlist status if user is logged in
            let isWishlisted = false;
            if(currentUser) {
                const wDoc = await db.collection('wishlists').doc(`${currentUser.uid}_${eventId}`).get();
                isWishlisted = wDoc.exists;
            }

            const img = ev.images && ev.images.length > 0 ? ev.images[0] : 'https://images.unsplash.com/photo-1540575467063-178a50c2df87';
            const safeDesc = (`<style>body{color:#e2e8f0; font-family:'Segoe UI', sans-serif; margin:0; padding:0; line-height:1.8; font-size:16px;} h1,h2,h3{color:#00f3ff; margin-top:0;} a{color:#bc13fe;}::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:#00f3ff;}</style>` + ev.description).replace(/"/g, '&quot;');

            const html = `
                <div class="section-container max-w-6xl mx-auto px-4">
                    <button onclick="navigate('home')" class="btn-neon mb-6 text-sm !border-gray-600 !text-gray-300 hover:!text-white"><i class="fa-solid fa-arrow-left"></i> Back to Catalog</button>
                    
                    <div class="glass-panel overflow-hidden border-t-4 border-t-[#bc13fe] shadow-2xl">
                        <div class="h-[400px] w-full bg-cover bg-center relative" style="background-image: url('${img}')">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#050508] to-transparent"></div>
                            <div class="absolute bottom-6 left-8">
                                <span class="bg-black/50 backdrop-blur-md border border-[#00f3ff] text-[#00f3ff] px-4 py-2 rounded-full text-sm font-bold uppercase"><i class="fa-solid fa-star text-yellow-400 mr-2"></i> Featured Event</span>
                            </div>
                        </div>
                        
                        <div class="p-8 md:p-12">
                            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                                <h1 class="text-4xl md:text-6xl font-black text-white uppercase tracking-tighter drop-shadow-lg">${ev.title}</h1>
                                
                                <div class="bg-black/60 p-6 rounded-2xl border border-gray-800 text-center min-w-[250px] shadow-xl">
                                    <p class="text-gray-400 text-sm uppercase font-bold tracking-widest mb-1">Exclusive Offer</p>
                                    <div class="flex justify-center items-baseline gap-3 mb-2">
                                        <span class="text-gray-500 line-through text-xl">₹${ev.price}</span>
                                        <span class="text-[#00f3ff] font-black text-4xl">₹${ev.discountPrice}</span>

        // Wishlist Logic
        async function toggleWishlist(eventId, eventName) {
            if(!currentUser) {
                alert("Please login to manage your wishlist!");
                openAuthModal();
                return;
            }
            const docRef = db.collection('wishlists').doc(`${currentUser.uid}_${eventId}`);
            const wIcon = document.getElementById(`wishlist-icon-${eventId}`);
            const wText = document.getElementById(`wishlist-text-${eventId}`);
            
            try {
                const docSnap = await docRef.get();
                if(docSnap.exists) {
                    await docRef.delete();
                    if(wIcon) { wIcon.classList.remove('fa-solid'); wIcon.classList.add('fa-regular'); }
                    if(wText) wText.innerText = "Add to Wishlist";
                    alert("Removed from Wishlist");
                } else {
                    await docRef.set({ userId: currentUser.uid, eventId, eventName, addedAt: new Date().toISOString() });
                    if(wIcon) { wIcon.classList.remove('fa-regular'); wIcon.classList.add('fa-solid'); }
                    if(wText) wText.innerText = "Remove from Wishlist";
                    alert("Saved to Wishlist! View it in your Dashboard.");
                }
            } catch(e) { console.error("Wishlist Error:", e); }
        }

            // Booking Document created strictly with 'Pending Verification'

        // =========================================
        // LOCATION API
        // =========================================
        function fetchLocation() {
            if (!navigator.geolocation) return alert("Geolocation not supported.");
            const addrField = document.getElementById('prof-addr');
            const pinField = document.getElementById('prof-pin');
            addrField.value = "Establishing satellite uplink...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await response.json();
                    if(data && data.display_name) {
                        addrField.value = data.display_name;
                        pinField.value = data.address.postcode || "";
                    } else addrField.value = "Coord resolution failed.";
                } catch (err) { addrField.value = "Network fault during OSM resolution."; }
            }, (error) => { addrField.value = ""; alert("Location permission denied."); }, { enableHighAccuracy: true });
        }

        async function sendBolAiMessage() {
            const input = document.getElementById('bol-ai-input');
            const msg = input.value.trim().toLowerCase();
            if(!msg) return;
            
            const chatBox = document.getElementById('bol-ai-chat');
            
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-msg user-msg !bg-[#00f3ff]/10 !border-[#00f3ff]/50 !m-0 shadow-md text-white';
            userDiv.innerHTML = `<i class="fa-solid fa-user-astronaut mr-2 text-[#00f3ff]"></i> ${msg}`;
            chatBox.appendChild(userDiv);
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const loadingId = 'ai-loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'chat-msg bot-msg !bg-[#bc13fe]/10 !border-[#bc13fe]/50 text-[#bc13fe] !m-0 font-mono text-xs uppercase tracking-widest';
            loadingDiv.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Processing Logic...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Artificial Delay for Neural Effect
            setTimeout(async () => {
                document.getElementById(loadingId).remove();
                let finalReply = offlineKnowledgeBase["default"];
                
                // Intelligent Offline Keyword Matching
                for (const [key, value] of Object.entries(offlineKnowledgeBase)) {
                    if (msg.includes(key)) { finalReply = value; break; }
                }

                // Attempt API, but seamlessly fallback to offline dictionary if it fails (FIXED)
                try {
                    const response = await fetch('api/chat.py', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: msg })
                    });
                    if(response.ok) {
                        const data = await response.json();
                        if(data.reply) finalReply = data.reply;
                    }
                } catch (error) {
                    console.log("Bol-AI API Offline. Falling back to local offline knowledge matrix seamlessly.");
                }
                
                const botDiv = document.createElement('div');
                botDiv.className = 'chat-msg bot-msg !bg-[#bc13fe]/10 !border-[#bc13fe]/50 !m-0 shadow-md text-white';
                botDiv.innerHTML = `<i class="fa-solid fa-microchip mr-2 text-[#00f3ff]"></i> ${finalReply}`;
                chatBox.appendChild(botDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Events | Premium Event Booking</title>
    
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons (No emojis) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Base Variables and Glassmorphism Theme */
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #0a0a0f;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(0, 243, 255, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Glass Panel Utility */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Neon Text Gradient */
        .neon-text {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Neon Buttons Design */
        .btn-neon {
            background: transparent;
            color: white;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            border-radius: 50px;
            padding: 10px 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-neon:hover {
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px var(--neon-blue);
            transform: scale(1.05);
        }

        /* Round Progress Bar (Loader) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; transition: opacity 0.5s;
        }
        
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(0, 243, 255, 0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Small text in UL as requested */
        ul.small-text li { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }

        /* Support Chatbot Widget */
        #chatbot-widget {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            width: 350px; display: none;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }
        
        .chat-msg { margin: 10px; padding: 10px; border-radius: 10px; max-width: 80%; font-size: 0.9rem;}
        .bot-msg { background: rgba(0,243,255,0.1); border: 1px solid var(--neon-blue); align-self: flex-start;}
        .user-msg { background: rgba(188,19,254,0.1); border: 1px solid var(--neon-purple); align-self: flex-end; margin-left: auto;}
        
        /* Custom Scrollbars for a slick look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
        
        .hidden { display: none !important; }
        .section-container { min-height: 100vh; padding-top: 80px; }
        
        /* Bol-AI specific animations */
        @keyframes pulse-border {
            0% { border-color: rgba(188,19,254,0.5); }
            50% { border-color: rgba(188,19,254,1); box-shadow: 0 0 15px rgba(188,19,254,0.5); }
            100% { border-color: rgba(188,19,254,0.5); }
        }
        .bol-ai-active { animation: pulse-border 2s infinite; }
    </style>
</head>
<body>

    <!-- Initial Page Loader -->
    <div id="loader">
        <div class="spinner"></div>
        <h2 class="mt-4 neon-text font-bold text-xl">Loading Our Events...</h2>
    </div>

    <!-- Top Navigation Bar -->
    <nav class="fixed w-full z-50 glass-panel border-0 border-b rounded-none px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-wider neon-text cursor-pointer" onclick="navigate('home')">
            <i class="fa-solid fa-calendar-check mr-2"></i>OUR EVENTS
        </h1>
        <div class="flex gap-4 items-center">
            <button class="text-gray-300 hover:text-white transition" onclick="navigate('settings')">
                <i class="fa-solid fa-gear text-xl"></i>
            </button>
            <div id="auth-nav-area">
                <!-- Login/Dashboard button injected here dynamically -->
            </div>
        </div>
    </nav>

    <!-- Main Dynamic Content Area -->
    <main id="app-content"></main>

    <!-- Floating Support Chatbot Toggle Button -->
    <button onclick="toggleChatbot()" class="fixed bottom-6 right-6 btn-neon !p-4 !rounded-full z-40">
        <i class="fa-solid fa-headset text-2xl"></i>
    </button>

    <!-- Support Chatbot Window (Kept exactly as requested, separate from Bol-AI) -->
    <div id="chatbot-widget" class="glass-panel flex-col h-[450px]">
        <div class="p-4 border-b border-[rgba(0,243,255,0.2)] flex justify-between items-center bg-[rgba(0,0,0,0.5)] rounded-t-[16px]">
            <h3 class="font-bold"><i class="fa-solid fa-robot mr-2"></i> Support Bot</h3>
            <button onclick="toggleChatbot()" class="hover:text-red-400 transition"><i class="fa-solid fa-times"></i></button>
        </div>
        <div id="chat-body" class="flex-1 overflow-y-auto p-2 flex flex-col">
            <div class="chat-msg bot-msg">Hello! Type "hi" to start or select an issue below.</div>
        </div>
        <div id="chat-options" class="p-2 grid grid-cols-1 gap-2 border-t border-[rgba(0,243,255,0.2)]">
            <button class="btn-neon !text-xs !py-1" onclick="handleChatOption('Payment Issue')">Payment Issue</button>
            <button class="btn-neon !text-xs !py-1" onclick="handleChatOption('Ticket not received')">Ticket not received</button>
            <button class="btn-neon !text-xs !py-1" onclick="handleChatOption('Other')">Other</button>
        </div>
        <div id="chat-input-area" class="p-2 hidden flex gap-2">
            <input type="text" id="chatInput" class="w-full bg-black border border-[rgba(0,243,255,0.5)] rounded p-2 text-sm outline-none focus:border-[#00f3ff] transition" placeholder="Type message...">
            <button onclick="sendChatMessage()" class="btn-neon !px-3"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Authentication Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex justify-center items-center">
        <div class="glass-panel w-[90%] max-w-md p-8 relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl"><i class="fa-solid fa-times"></i></button>
            <h2 id="auth-title" class="text-2xl font-bold mb-6 neon-text text-center">Login</h2>
            
            <input type="email" id="auth-email" placeholder="Email Address" class="w-full mb-4 bg-black/50 border border-gray-600 rounded-lg p-3 outline-none focus:border-[#00f3ff] transition">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full mb-4 bg-black/50 border border-gray-600 rounded-lg p-3 outline-none focus:border-[#00f3ff] transition">
            
            <button id="auth-action-btn" onclick="handleEmailAuth()" class="btn-neon w-full justify-center mb-4 text-lg font-bold">Login</button>
            
            <div class="text-center mb-4 text-gray-400 font-semibold">OR</div>
            
            <button onclick="handleGoogleLogin()" class="w-full bg-white text-black font-bold rounded-lg p-3 mb-4 flex items-center justify-center gap-2 hover:bg-gray-200 transition shadow-lg">
                <i class="fa-brands fa-google text-red-500 text-xl"></i> Continue with Google
            </button>
            
            <p class="text-center text-sm text-gray-400 cursor-pointer hover:text-white transition" onclick="toggleAuthMode()" id="auth-toggle-text">Don't have an account? Register</p>
        </div>
    </div>

    <!-- Firebase SDKs (v8 compat for simpler monolithic single-file build) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAbWud5zRj5Df5Ur55iTwuAUdcHSCKBU0U",
            authDomain: "our-event-vivekapps.firebaseapp.com",
            projectId: "our-event-vivekapps",
            storageBucket: "our-event-vivekapps.firebasestorage.app",
            messagingSenderId: "15973302901",
            appId: "1:15973302901:web:78d2c33e83f3161c47ae3c"
        };

        // Initialize Firebase services
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Customer Support Email (Obfuscated to prevent spam bots)
        const __p1 = "vivekdalvi147";
        const __p2 = "gmail.com";
        const getSupportMail = () => `${__p1}@${__p2}`;

        // Global Application State
        let currentUser = null;
        let isLoginMode = true;
        let eventsList =[];
        let intendedPurchase = null;

        // Hide Loader and initialize app on window load
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);
            fetchEvents();
            navigate('home');
        };

        // Authentication State Listener
        auth.onAuthStateChanged((user) => {
            currentUser = user;
            const navArea = document.getElementById('auth-nav-area');
            if(user) {
                navArea.innerHTML = `
                    <button onclick="navigate('dashboard')" class="btn-neon !px-4 !py-2 !text-sm font-bold"><i class="fa-solid fa-user"></i> Dashboard</button>
                `;
                // Process any pending purchase that required login
                if(intendedPurchase) {
                    processPurchase(intendedPurchase);
                    intendedPurchase = null;
                }
            } else {
                navArea.innerHTML = `
                    <button onclick="openAuthModal()" class="btn-neon !px-4 !py-2 !text-sm font-bold"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
                `;
            }
        });

        // Main Navigation Router
        function navigate(view, data = null) {
            const app = document.getElementById('app-content');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if(view === 'home') renderHome(app);
            else if(view === 'dashboard') renderDashboard(app);
            else if(view === 'admin') renderAdmin(app);
            else if(view === 'settings') renderSettings(app);
            else if(view === 'eventDetails') renderEventDetails(app, data);
        }

        // =========================================
        // 1. HOME VIEW & 30+ SECTIONS ENGINE
        // =========================================
        function renderHome(container) {
            let html = `
                <!-- Hero Section -->
                <div class="relative w-full h-screen flex items-center justify-center text-center px-4">
                    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30')] bg-cover bg-center opacity-30"></div>
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black"></div>
                    <div class="z-10 max-w-3xl glass-panel p-10">
                        <h1 class="text-5xl md:text-7xl font-black mb-4 neon-text">DISCOVER<br>OUR EVENTS</h1>
                        <p class="mb-8 text-gray-300 text-lg">The ultimate futuristic ticketing platform for premium experiences.</p>
                        <button onclick="document.getElementById('events-grid').scrollIntoView({behavior:'smooth'})" class="btn-neon text-xl font-bold"><i class="fa-solid fa-ticket"></i> Explore Now</button>
                    </div>
                </div>
                
                <div class="max-w-7xl mx-auto px-6 py-12">
                    <h2 class="text-4xl font-bold mb-8 border-b border-[rgba(0,243,255,0.3)] pb-4"><i class="fa-solid fa-fire text-orange-500 mr-3"></i> Trending Events</h2>
                    <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <!-- Events will be dynamically injected here -->
                    </div>
                </div>
            `;

            // Auto-generate requested 30+ sections dynamically to maintain code structure
            const extraSections =[
                {id:"about", title:"About the Event", icon:"fa-info-circle"},
                {id:"schedule", title:"Schedule / Agenda", icon:"fa-clock"},
                {id:"speakers", title:"Speakers / Performers", icon:"fa-users"},
                {id:"gallery", title:"Gallery", icon:"fa-images"},
                {id:"sponsors", title:"Sponsors & Partners", icon:"fa-handshake"},
                {id:"pricing", title:"Pricing / Tickets", icon:"fa-tags"},
                {id:"venue", title:"Venue & Travel Info", icon:"fa-map-location-dot"},
                {id:"accommodation", title:"Accommodation Block", icon:"fa-bed"},
                {id:"countdown", title:"Countdown Timer", icon:"fa-hourglass-half"},
                {id:"registration", title:"Registration Form", icon:"fa-clipboard-list"},
                {id:"callforpapers", title:"Speaker Application", icon:"fa-microphone"},
                {id:"volunteers", title:"Volunteers / Careers", icon:"fa-hands-helping"},
                {id:"blog", title:"Blog / Updates", icon:"fa-newspaper"},
                {id:"faq", title:"FAQ", icon:"fa-question-circle"},
                {id:"testimonials", title:"Testimonials", icon:"fa-comments"},
                {id:"accessibility", title:"Accessibility & Inclusion", icon:"fa-wheelchair"},
                {id:"health", title:"Health & Safety", icon:"fa-briefcase-medical"},
                {id:"sustainability", title:"Sustainability Pledge", icon:"fa-leaf"},
                {id:"networking", title:"Networking Lounge (virtual)", icon:"fa-network-wired"},
                {id:"gamification", title:"Gamification", icon:"fa-gamepad"},
                {id:"language", title:"Multi-language Switcher", icon:"fa-language"},
                {id:"postevent", title:"Post-Event Kit", icon:"fa-box-open"},
                {id:"analytics", title:"Analytics Pixel", icon:"fa-chart-line"},
                {id:"refund", title:"Refund & Transfer Policy", icon:"fa-money-bill-transfer"},
                {id:"social", title:"Social Wall", icon:"fa-hashtag"},
                {id:"press", title:"Press & Media", icon:"fa-camera"},
            ];

            html += `<div class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-2 gap-6">`;
            extraSections.forEach(sec => {
                html += `
                <div class="glass-panel p-6 hover:-translate-y-2 transition duration-300 cursor-pointer">
                    <h3 class="text-xl font-bold neon-text mb-2"><i class="fa-solid ${sec.icon} mr-2"></i> ${sec.title}</h3>
                    <p class="text-sm text-gray-400">Detailed information regarding ${sec.title.toLowerCase()} will be displayed here for users.</p>
                </div>`;
            });
            html += `</div>`;

            container.innerHTML = html;
            renderEventsGrid();
        }

        // Fetch events from Firestore database
        async function fetchEvents() {
            try {
                const snapshot = await db.collection('events').get();
                eventsList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if(document.getElementById('events-grid')) renderEventsGrid();
            } catch (error) {
                console.log("Error fetching events: ", error);
            }
        }

        // Render the events grid on the home page
        // Upgraded: Removed description from card to prevent HTML/CSS breakage. Added click-to-view logic.
        function renderEventsGrid() {
            const grid = document.getElementById('events-grid');
            if(!grid) return;
            
            if(eventsList.length === 0) {
                grid.innerHTML = `<p class="text-gray-400 text-lg">No events found. Admin needs to add some!</p>`;
                return;
            }

            let html = '';
            eventsList.forEach(ev => {
                const img = ev.images && ev.images.length > 0 ? ev.images[0] : 'https://images.unsplash.com/photo-1540575467063-178a50c2df87';
                
                // Card UI - Description is intentionally omitted here to keep UI clean and prevent CSS conflicts
                html += `
                <div class="glass-panel overflow-hidden flex flex-col group relative cursor-pointer" onclick="navigate('eventDetails', '${ev.id}')">
                    <div class="h-48 w-full bg-cover bg-center transition duration-500 group-hover:scale-110" style="background-image: url('${img}')"></div>
                    <div class="p-6 flex-1 flex flex-col relative z-10 bg-[rgba(10,10,15,0.8)]">
                        <h3 class="text-2xl font-bold mb-4 uppercase tracking-wide neon-text">${ev.title}</h3>
                        
                        <div class="mt-auto">
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <span class="text-gray-400 line-through text-sm">₹${ev.price}</span>
                                    <span class="text-[#00f3ff] font-bold text-2xl ml-2">₹${ev.discountPrice}</span>
                                </div>
                            </div>
                            <button onclick="event.stopPropagation(); navigate('eventDetails', '${ev.id}')" class="btn-neon w-full justify-center font-bold">
                                <i class="fa-solid fa-circle-info"></i> View Details & Buy
                            </button>
                        </div>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        // =========================================
        // 2. EVENT DETAILS PAGE (HTML/CSS ISOLATION)
        // =========================================
        // Upgraded: This new view safely renders the admin's HTML/CSS/JS using an iframe srcdoc
        function renderEventDetails(container, eventId) {
            const ev = eventsList.find(e => e.id === eventId);
            if(!ev) {
                navigate('home');
                return;
            }

            const img = ev.images && ev.images.length > 0 ? ev.images[0] : 'https://images.unsplash.com/photo-1540575467063-178a50c2df87';
            
            // Injecting base styles into the iframe so the text is readable on dark mode, 
            // while still allowing the admin's custom HTML/CSS to work perfectly.
            const baseStyle = `<style>body{color:white; font-family:'Segoe UI', sans-serif; margin:0; padding:10px; line-height:1.6;}</style>`;
            
            // Escaping double quotes so it doesn't break the srcdoc attribute
            const safeDesc = (baseStyle + ev.description).replace(/"/g, '&quot;');

            const html = `
                <div class="section-container max-w-5xl mx-auto px-4 py-8">
                    <button onclick="navigate('home')" class="btn-neon mb-6"><i class="fa-solid fa-arrow-left"></i> Back to Events</button>
                    
                    <div class="glass-panel overflow-hidden">
                        <div class="h-64 w-full bg-cover bg-center" style="background-image: url('${img}')"></div>
                        
                        <div class="p-8">
                            <h1 class="text-4xl md:text-5xl font-black mb-4 neon-text uppercase">${ev.title}</h1>
                            
                            <div class="flex gap-4 items-center mb-8 bg-black/40 p-4 rounded-lg inline-flex border border-[rgba(0,243,255,0.2)]">
                                <span class="text-gray-400 line-through text-xl">Original: ₹${ev.price}</span>
                                <span class="text-[#00f3ff] font-bold text-3xl ml-4">Offer: ₹${ev.discountPrice}</span>
                            </div>
                            
                            <div class="mb-8 w-full bg-black/50 rounded-lg p-4 border border-gray-700">
                                <h3 class="text-xl font-bold mb-4 text-gray-300 border-b border-gray-700 pb-2"><i class="fa-solid fa-align-left mr-2"></i> Event Description</h3>
                                
                                <!-- Using iframe srcdoc to completely isolate the admin's HTML/CSS/JS. 
                                     This prevents the 'ul' tags and other elements from breaking the main website layout -->
                                <iframe srcdoc="${safeDesc}" class="w-full rounded" style="min-height: 400px; border: none; background: transparent;" onload="this.style.height = this.contentWindow.document.documentElement.scrollHeight + 'px';"></iframe>
                            </div>

                            <button onclick="initiatePurchase('${ev.id}')" class="btn-neon w-full justify-center text-2xl py-4 font-bold shadow-[0_0_20px_rgba(0,243,255,0.4)]">
                                <i class="fa-solid fa-cart-shopping"></i> Buy Ticket Now
                            </button>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        // =========================================
        // 3. WHATSAPP PURCHASE & AUTH GUARD
        // =========================================
        function initiatePurchase(eventId) {
            // Force login if user is not authenticated
            if(!currentUser) {
                intendedPurchase = eventId;
                openAuthModal();
                return;
            }
            processPurchase(eventId);
        }

        // Upgraded: Added user UID to the WhatsApp message as requested
        function processPurchase(eventId) {
            const ev = eventsList.find(e => e.id === eventId);
            if(!ev) return;

            const phone = "918691854254";
            const userEmail = currentUser.email;
            const userId = currentUser.uid;
            
            // Constructing the detailed WhatsApp message
            const message = `Hello Our Events,\n\nI want to buy a ticket.\n\n🎟️ *Event Name:* ${ev.title}\n💰 *Price:* ₹${ev.discountPrice}\n📧 *My Email:* ${userEmail}\n🆔 *User UID:* ${userId}\n\nPlease provide payment details.`;
            
            const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            
            // Save booking record to Firestore
            db.collection('bookings').add({
                userId: userId,
                userEmail: userEmail,
                eventId: ev.id,
                eventName: ev.title,
                price: ev.discountPrice,
                status: 'Pending Verification',
                date: new Date().toISOString()
            }).catch(err => console.log("Booking save error:", err));

            window.open(waUrl, '_blank');
            alert("Redirecting to WhatsApp to complete your purchase securely!");
            navigate('dashboard');
        }

        // =========================================
        // 4. AUTHENTICATION LOGIC
        // =========================================
        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }
        
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Register";
            document.getElementById('auth-action-btn').innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? "Don't have an account? Register" : "Already have an account? Login";
        }

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Enter email and password!");
            
            try {
                if(isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    await auth.createUserWithEmailAndPassword(email, pass);
                }
                closeAuthModal();
            } catch(e) { alert(e.message); }
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                closeAuthModal();
            } catch(e) { alert(e.message); }
        }

        function handleLogout() {
            auth.signOut();
            navigate('home');
        }

        // =========================================
        // 5. DASHBOARD & PROFILE (WITH BOL-AI)
        // =========================================
        function renderDashboard(container) {
            if(!currentUser) { navigate('home'); return; }

            const html = `
                <div class="section-container max-w-7xl mx-auto px-4 flex flex-col md:flex-row gap-6">
                    <!-- Sidebar Navigation -->
                    <div class="w-full md:w-1/4 glass-panel p-4 h-fit sticky top-24">
                        <div class="text-center mb-6">
                            <div class="w-20 h-20 mx-auto bg-gray-700 rounded-full mb-3 flex items-center justify-center text-3xl border-2 border-[#00f3ff]">
                                <i class="fa-solid fa-user-astronaut"></i>
                            </div>

        // =========================================
        // 6. REAL GEOLOCATION API (NOMINATIM)
        // =========================================
        // Upgraded: Replaced mock data with actual reverse geocoding using OpenStreetMap Nominatim API
        function fetchLocation() {
            if (navigator.geolocation) {
                const addrField = document.getElementById('prof-addr');
                const pinField = document.getElementById('prof-pin');
                
                addrField.value = "Fetching GPS coordinates...";
                
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    addrField.value = `Resolving address for Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}...`;
                    
                    try {
                        // Calling real API for reverse geocoding
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`, {
                            headers: { 'Accept-Language': 'en' }
                        });
                        
                        const data = await response.json();
                        
                        if(data && data.display_name) {
                            addrField.value = data.display_name;
                            pinField.value = data.address.postcode || "";
                            alert("Location successfully resolved!");
                        } else {
                            addrField.value = `Lat: ${lat}, Lon: ${lon}\n(Address resolution failed)`;
                            alert("Location fetched, but address resolution failed.");
                        }
                    } catch (err) {
                        addrField.value = `Lat: ${lat}, Lon: ${lon}\n(Network error during resolution)`;
                        alert("Location fetched, but network error occurred during address resolution.");
                    }
                }, (error) => {
                    addrField.value = "";
                    alert("Please allow location access in your browser settings. Error: " + error.message);
                }, { enableHighAccuracy: true, timeout: 10000 });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        // Upgraded: New function to handle Bol-AI chat logic calling api/chat.py
        async function sendBolAiMessage() {
            const input = document.getElementById('bol-ai-input');
            const msg = input.value.trim();
            if(!msg) return;
            
            const chatBox = document.getElementById('bol-ai-chat');
            
            // Append User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-msg user-msg !bg-[rgba(0,243,255,0.1)] !border-[#00f3ff] !m-0 shadow-md';
            userDiv.innerText = msg;
            chatBox.appendChild(userDiv);
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // Append Loading Indicator
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'chat-msg bot-msg !bg-[rgba(188,19,254,0.1)] !border-[#bc13fe] text-gray-400 !m-0 italic';
            loadingDiv.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Bol-AI is thinking...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Making the actual API call to api/chat.py as requested
                const response = await fetch('api/chat.py', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: msg, 
                        userId: currentUser ? currentUser.uid : 'guest',
                        timestamp: new Date().toISOString()
                    })
                });
                
                let reply = "Sorry, Bol-AI is currently offline.";
                
                if(response.ok) {
                    const data = await response.json();
                    reply = data.reply || data.response || "I received your message but have no reply.";
                } else {
                    // Fallback mock response if api/chat.py is not deployed yet
                    reply = "Bol-AI API (api/chat.py) is not reachable right now. Please ensure the backend is running. You said: " + msg;
                }
                
                // Remove loading indicator and show response
                chatBox.removeChild(loadingDiv);
                
                const botDiv = document.createElement('div');
                botDiv.className = 'chat-msg bot-msg !bg-[rgba(188,19,254,0.1)] !border-[#bc13fe] !m-0 shadow-md';
                botDiv.innerText = reply;
                chatBox.appendChild(botDiv);
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                // Handle network errors gracefully
                chatBox.removeChild(loadingDiv);
                const botDiv = document.createElement('div');
                botDiv.className = 'chat-msg bot-msg !bg-[rgba(188,19,254,0.1)] !border-[#bc13fe] !m-0 shadow-md text-red-300';
                botDiv.innerHTML = "<i class='fa-solid fa-triangle-exclamation mr-2'></i> Error connecting to Bol-AI (api/chat.py). Mocking response: I am Bol-AI, ready to help!";
                chatBox.appendChild(botDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

                        resolve({ type: 'options', msg: "Hi there! How can we help you today? Please select an option." });

                timestamp: new Date().toISOString()
            }).catch(err => console.log("Ticket save error (might need auth rules adjustment):", err));

            appendChatMsg(`Ticket ID: ${ticketId} generated successfully. Our customer support team will contact you within 24 hours.`, false);
            
            // Reset bot after 3 seconds
            setTimeout(() => {
                appendChatMsg("Is there anything else I can help you with? Type 'hi' to restart.", false);
            }, 3000);
        }

        // Allow pressing Enter in the support chat input
        document.getElementById('chatInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendChatMessage();
        });

    </script>
</body>
</html>

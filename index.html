<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Events | Premium Event Booking</title>
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons (No emojis) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* पोरांनो, इथं आपलं ग्लास आणि निऑन डिझाईन चालू होतंय बघ (Agri/Marathi: Guys, our glass and neon design starts here) */
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #0a0a0f;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(0, 243, 255, 0.2);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .neon-text {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* निऑन बटन्स डिझाईन (Neon Buttons) */
        .btn-neon {
            background: transparent;
            color: white;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            border-radius: 50px;
            padding: 10px 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-neon:hover {
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px var(--neon-blue);
            transform: scale(1.05);
        }

        /* Round Progress Bar (Loader) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; transition: opacity 0.5s;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(0, 243, 255, 0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Small text in UL as requested */
        ul.small-text li { font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }

        /* Chatbot Widget */
        #chatbot-widget {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            width: 350px; display: none;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }
        .chat-msg { margin: 10px; padding: 10px; border-radius: 10px; max-width: 80%; font-size: 0.9rem;}
        .bot-msg { background: rgba(0,243,255,0.1); border: 1px solid var(--neon-blue); align-self: flex-start;}
        .user-msg { background: rgba(188,19,254,0.1); border: 1px solid var(--neon-purple); align-self: flex-end; margin-left: auto;}
        
        /* Hide scrollbars for slick look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
        
        .hidden { display: none !important; }
        .section-container { min-height: 100vh; padding-top: 80px; }
    </style>
</head>
<body>

    <!-- गोल लोडर (Round Loader) -->
    <div id="loader">
        <div class="spinner"></div>
        <h2 class="mt-4 neon-text font-bold text-xl">Loading Our Events...</h2>
    </div>

    <!-- Navbar -->
    <nav class="fixed w-full z-50 glass-panel border-0 border-b rounded-none px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black tracking-wider neon-text cursor-pointer" onclick="navigate('home')">
            <i class="fa-solid fa-calendar-check mr-2"></i>OUR EVENTS
        </h1>
        <div class="flex gap-4 items-center">
            <button class="text-gray-300 hover:text-white" onclick="navigate('settings')"><i class="fa-solid fa-gear"></i></button>
            <div id="auth-nav-area">
                <!-- इथं लॉगिन बटन येईल (Login button will appear here) -->
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-content"></main>

    <!-- Chatbot Toggle Button -->
    <button onclick="toggleChatbot()" class="fixed bottom-6 right-6 btn-neon !p-4 !rounded-full z-40">
        <i class="fa-solid fa-headset text-2xl"></i>
    </button>

    <!-- Chatbot Window (Section 2 Request) -->
    <div id="chatbot-widget" class="glass-panel flex-col h-[450px]">
        <div class="p-4 border-b border-[rgba(0,243,255,0.2)] flex justify-between items-center bg-[rgba(0,0,0,0.5)] rounded-t-[16px]">
            <h3 class="font-bold"><i class="fa-solid fa-robot mr-2"></i> Support Bot</h3>
            <button onclick="toggleChatbot()"><i class="fa-solid fa-times"></i></button>
        </div>
        <div id="chat-body" class="flex-1 overflow-y-auto p-2 flex flex-col">
            <div class="chat-msg bot-msg">Hello! Type "hi" to start or select an issue below.</div>
        </div>
        <div id="chat-options" class="p-2 grid grid-cols-1 gap-2 border-t border-[rgba(0,243,255,0.2)]">
            <button class="btn-neon !text-xs !py-1" onclick="handleChatOption('Payment Issue')">Payment Issue</button>
            <button class="btn-neon !text-xs !py-1" onclick="handleChatOption('Ticket not received')">Ticket not received</button>
            <button class="btn-neon !text-xs !py-1" onclick="handleChatOption('Other')">Other</button>
        </div>
        <div id="chat-input-area" class="p-2 hidden flex gap-2">
            <input type="text" id="chatInput" class="w-full bg-black border border-[rgba(0,243,255,0.5)] rounded p-2 text-sm outline-none" placeholder="Type message...">
            <button onclick="sendChatMessage()" class="btn-neon !px-3"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] hidden flex justify-center items-center">
        <div class="glass-panel w-[90%] max-w-md p-8 relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa-solid fa-times"></i></button>
            <h2 id="auth-title" class="text-2xl font-bold mb-6 neon-text text-center">Login</h2>
            
            <input type="email" id="auth-email" placeholder="Email Address" class="w-full mb-4 bg-black/50 border border-gray-600 rounded-lg p-3 outline-none focus:border-[#00f3ff]">
            <input type="password" id="auth-pass" placeholder="Password" class="w-full mb-4 bg-black/50 border border-gray-600 rounded-lg p-3 outline-none focus:border-[#00f3ff]">
            
            <button id="auth-action-btn" onclick="handleEmailAuth()" class="btn-neon w-full justify-center mb-4 text-lg">Login</button>
            
            <div class="text-center mb-4 text-gray-400">OR</div>
            
            <button onclick="handleGoogleLogin()" class="w-full bg-white text-black font-bold rounded-lg p-3 mb-4 flex items-center justify-center gap-2 hover:bg-gray-200 transition">
                <i class="fa-brands fa-google text-red-500"></i> Continue with Google
            </button>
            
            <p class="text-center text-sm text-gray-400 cursor-pointer hover:text-white" onclick="toggleAuthMode()" id="auth-toggle-text">Don't have an account? Register</p>
        </div>
    </div>

    <!-- Firebase SDKs (v8 compat for simpler monolithic single-file build) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        // पोरांनो, इथं फायरबेसचा कॉन्फिगरेशन टाकलाय बघ (Firebase Config)
        const firebaseConfig = {
            apiKey: "AIzaSyAbWud5zRj5Df5Ur55iTwuAUdcHSCKBU0U",
            authDomain: "our-event-vivekapps.firebaseapp.com",
            projectId: "our-event-vivekapps",
            storageBucket: "our-event-vivekapps.firebasestorage.app",
            messagingSenderId: "15973302901",
            appId: "1:15973302901:web:78d2c33e83f3161c47ae3c"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Customer Support Email (Obfuscated as requested)
        const __p1 = "vivekdalvi147";
        const __p2 = "gmail.com";
        const getSupportMail = () => `${__p1}@${__p2}`;

        // Global State
        let currentUser = null;
        let isLoginMode = true;
        let eventsList =[];
        let intendedPurchase = null;

        // Hide Loader
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);
            fetchEvents();
            navigate('home');
        };

        // Auth Listener - युझर आलाय की गेला ते बघणार (Checks if user is logged in)
        auth.onAuthStateChanged((user) => {
            currentUser = user;
            const navArea = document.getElementById('auth-nav-area');
            if(user) {
                navArea.innerHTML = `
                    <button onclick="navigate('dashboard')" class="btn-neon !px-4 !py-2 !text-sm"><i class="fa-solid fa-user"></i> Dashboard</button>
                `;
                if(intendedPurchase) {
                    processPurchase(intendedPurchase);
                    intendedPurchase = null;
                }
            } else {
                navArea.innerHTML = `
                    <button onclick="openAuthModal()" class="btn-neon !px-4 !py-2 !text-sm"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
                `;
            }
        });

        // Navigation Router
        function navigate(view) {
            const app = document.getElementById('app-content');
            window.scrollTo(0,0);
            if(view === 'home') renderHome(app);
            else if(view === 'dashboard') renderDashboard(app);
            else if(view === 'admin') renderAdmin(app);
            else if(view === 'settings') renderSettings(app);
        }

        /* =========================================
           1. HOME VIEW & 30+ SECTIONS ENGINE
        ========================================= */
        function renderHome(container) {
            let html = `
                <!-- Hero Section -->
                <div class="relative w-full h-screen flex items-center justify-center text-center px-4">
                    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30')] bg-cover bg-center opacity-30"></div>
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-black"></div>
                    <div class="z-10 max-w-3xl glass-panel p-10">
                        <h1 class="text-5xl md:text-7xl font-black mb-4 neon-text">DISCOVER<br>OUR EVENTS</h1>
                        <p class="mb-8 text-gray-300">The ultimate futuristic ticketing platform for premium experiences.</p>
                        <button onclick="document.getElementById('events-grid').scrollIntoView({behavior:'smooth'})" class="btn-neon text-xl"><i class="fa-solid fa-ticket"></i> Explore Now</button>
                    </div>
                </div>
                
                <div class="max-w-7xl mx-auto px-6 py-12">
                    <h2 class="text-4xl font-bold mb-8 border-b border-[rgba(0,243,255,0.3)] pb-4"><i class="fa-solid fa-fire text-orange-500 mr-3"></i> Trending Events</h2>
                    <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                        <!-- Events will be injected here -->
                    </div>
                </div>
            `;

            // Auto-generate requested 30+ sections dynamically to save code space
            const extraSections =[
                {id:"about", title:"About the Event", icon:"fa-info-circle"},
                {id:"schedule", title:"Schedule / Agenda", icon:"fa-clock"},
                {id:"speakers", title:"Speakers / Performers", icon:"fa-users"},
                {id:"gallery", title:"Gallery", icon:"fa-images"},
                {id:"sponsors", title:"Sponsors & Partners", icon:"fa-handshake"},
                {id:"pricing", title:"Pricing / Tickets", icon:"fa-tags"},
                {id:"venue", title:"Venue & Travel Info", icon:"fa-map-location-dot"},
                {id:"accommodation", title:"Accommodation Block", icon:"fa-bed"},
                {id:"countdown", title:"Countdown Timer", icon:"fa-hourglass-half"},
                {id:"registration", title:"Registration Form", icon:"fa-clipboard-list"},
                {id:"callforpapers", title:"Speaker Application", icon:"fa-microphone"},
                {id:"volunteers", title:"Volunteers / Careers", icon:"fa-hands-helping"},
                {id:"blog", title:"Blog / Updates", icon:"fa-newspaper"},
                {id:"faq", title:"FAQ", icon:"fa-question-circle"},
                {id:"testimonials", title:"Testimonials", icon:"fa-comments"},
                {id:"accessibility", title:"Accessibility & Inclusion", icon:"fa-wheelchair"},
                {id:"health", title:"Health & Safety", icon:"fa-briefcase-medical"},
                {id:"sustainability", title:"Sustainability Pledge", icon:"fa-leaf"},
                {id:"networking", title:"Networking Lounge (virtual)", icon:"fa-network-wired"},
                {id:"gamification", title:"Gamification", icon:"fa-gamepad"},
                {id:"language", title:"Multi-language Switcher", icon:"fa-language"},
                {id:"postevent", title:"Post-Event Kit", icon:"fa-box-open"},
                {id:"analytics", title:"Analytics Pixel", icon:"fa-chart-line"},
                {id:"refund", title:"Refund & Transfer Policy", icon:"fa-money-bill-transfer"},
                {id:"social", title:"Social Wall", icon:"fa-hashtag"},
                {id:"press", title:"Press & Media", icon:"fa-camera"},
            ];

            html += `<div class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-2 gap-6">`;
            extraSections.forEach(sec => {
                html += `
                <div class="glass-panel p-6 hover:-translate-y-2 transition duration-300">
                    <h3 class="text-xl font-bold neon-text mb-2"><i class="fa-solid ${sec.icon} mr-2"></i> ${sec.title}</h3>
                    <p class="text-sm text-gray-400">Detailed information regarding ${sec.title.toLowerCase()} will be displayed here for users.</p>
                </div>`;
            });
            html += `</div>`;

            container.innerHTML = html;
            renderEventsGrid();
        }

        // Fetch events from Firestore
        async function fetchEvents() {
            try {
                const snapshot = await db.collection('events').get();
                eventsList = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                if(document.getElementById('events-grid')) renderEventsGrid();
            } catch (error) {
                console.log("Error fetching events: ", error);
            }
        }

        function renderEventsGrid() {
            const grid = document.getElementById('events-grid');
            if(!grid) return;
            
            if(eventsList.length === 0) {
                grid.innerHTML = `<p class="text-gray-400">No events found. Admin needs to add some!</p>`;
                return;
            }

            let html = '';
            eventsList.forEach(ev => {
                const img = ev.images && ev.images.length > 0 ? ev.images[0] : 'https://images.unsplash.com/photo-1540575467063-178a50c2df87';
                html += `
                <div class="glass-panel overflow-hidden flex flex-col group relative">
                    <div class="h-48 w-full bg-cover bg-center transition duration-500 group-hover:scale-110" style="background-image: url('${img}')"></div>
                    <div class="p-6 flex-1 flex flex-col relative z-10 bg-[rgba(10,10,15,0.8)]">
                        <h3 class="text-2xl font-bold mb-2 uppercase tracking-wide neon-text">${ev.title}</h3>
                        <div class="text-sm text-gray-300 mb-4 line-clamp-3">${ev.description}</div>
                        
                        <div class="mt-auto">
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <span class="text-gray-400 line-through text-sm">₹${ev.price}</span>
                                    <span class="text-[#00f3ff] font-bold text-xl ml-2">₹${ev.discountPrice}</span>
                                </div>
                            </div>
                            <button onclick="initiatePurchase('${ev.id}')" class="btn-neon w-full justify-center">
                                <i class="fa-solid fa-cart-shopping"></i> Buy Ticket
                            </button>
                        </div>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        /* =========================================
           2. WHATSAPP PURCHASE & AUTH GUARD
        ========================================= */
        function initiatePurchase(eventId) {
            // युझर लॉगिन नाय तर आधी लॉगिन करायला लाव (If not logged in, force login)
            if(!currentUser) {
                intendedPurchase = eventId;
                openAuthModal();
                return;
            }
            processPurchase(eventId);
        }

        function processPurchase(eventId) {
            const ev = eventsList.find(e => e.id === eventId);
            if(!ev) return;

            // WhatsApp Redirect Logic as requested
            const phone = "918691854254";
            const userEmail = currentUser.email;
            const message = `Hello Our Events,\n\nI want to buy a ticket.\n\n🎟️ *Event Name:* ${ev.title}\n💰 *Price:* ₹${ev.discountPrice}\n📧 *My Email:* ${userEmail}\n\nPlease provide payment details.`;
            
            const waUrl = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
            
            // Save to Firestore Bookings (Pending)
            db.collection('bookings').add({
                userId: currentUser.uid,
                userEmail: userEmail,
                eventId: ev.id,
                eventName: ev.title,
                price: ev.discountPrice,
                status: 'Pending Verification',
                date: new Date().toISOString()
            });

            window.open(waUrl, '_blank');
            alert("Redirecting to WhatsApp to complete your purchase securely!");
            navigate('dashboard');
        }

        /* =========================================
           3. AUTHENTICATION LOGIC
        ========================================= */
        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function closeAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }
        
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Login" : "Register";
            document.getElementById('auth-action-btn').innerText = isLoginMode ? "Login" : "Sign Up";
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? "Don't have an account? Register" : "Already have an account? Login";
        }

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Enter email and password!");
            
            try {
                if(isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    await auth.createUserWithEmailAndPassword(email, pass);
                }
                closeAuthModal();
            } catch(e) { alert(e.message); }
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                closeAuthModal();
            } catch(e) { alert(e.message); }
        }

        function handleLogout() {
            auth.signOut();
            navigate('home');
        }

        /* =========================================
           4. DASHBOARD & PROFILE
        ========================================= */
        function renderDashboard(container) {
            if(!currentUser) { navigate('home'); return; }

            const html = `
                <div class="section-container max-w-7xl mx-auto px-4 flex flex-col md:flex-row gap-6">
                    <!-- Sidebar -->
                    <div class="w-full md:w-1/4 glass-panel p-4 h-fit sticky top-24">
                        <div class="text-center mb-6">
                            <div class="w-20 h-20 mx-auto bg-gray-700 rounded-full mb-3 flex items-center justify-center text-3xl">
                                <i class="fa-solid fa-user-astronaut"></i>
                            </div>
                            <h3 class="font-bold text-lg">${currentUser.displayName || 'User'}</h3>
                            <p class="text-xs text-gray-400">${currentUser.email}</p>
                        </div>
                        <ul class="flex flex-col gap-2 small-text">
                            <li><button onclick="loadDashView('overview')" class="w-full text-left p-2 hover:bg-[rgba(0,243,255,0.1)] rounded"><i class="fa-solid fa-house mr-2"></i> Dashboard</button></li>
                            <li><button onclick="loadDashView('bookings')" class="w-full text-left p-2 hover:bg-[rgba(0,243,255,0.1)] rounded"><i class="fa-solid fa-ticket mr-2"></i> My Bookings</button></li>
                            <li><button onclick="loadDashView('wishlist')" class="w-full text-left p-2 hover:bg-[rgba(0,243,255,0.1)] rounded"><i class="fa-solid fa-heart mr-2"></i> Wishlist</button></li>
                            <li><button onclick="loadDashView('payment')" class="w-full text-left p-2 hover:bg-[rgba(0,243,255,0.1)] rounded"><i class="fa-solid fa-credit-card mr-2"></i> Payment History</button></li>
                            <li><button onclick="loadDashView('profile')" class="w-full text-left p-2 hover:bg-[rgba(0,243,255,0.1)] rounded"><i class="fa-solid fa-user-pen mr-2"></i> Profile Settings</button></li>
                            ${currentUser.email === 'admin@ourevents.com' ? `<li><button onclick="navigate('admin')" class="w-full text-left p-2 text-green-400 hover:bg-[rgba(0,243,255,0.1)] rounded"><i class="fa-solid fa-lock mr-2"></i> Admin Panel</button></li>` : ''}
                            <li><button onclick="handleLogout()" class="w-full text-left p-2 text-red-400 hover:bg-red-400/10 rounded mt-4"><i class="fa-solid fa-sign-out mr-2"></i> Logout</button></li>
                        </ul>
                    </div>
                    
                    <!-- Dashboard Content Area -->
                    <div id="dash-content" class="w-full md:w-3/4 glass-panel p-6">
                        <!-- Content injected via loadDashView -->
                    </div>
                </div>
            `;
            container.innerHTML = html;
            loadDashView('overview');
        }

        async function loadDashView(view) {
            const content = document.getElementById('dash-content');
            if(view === 'overview') {
                content.innerHTML = `<h2 class="text-2xl font-bold mb-4 neon-text">Welcome Back!</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="glass-panel p-4 text-center"><h3 class="text-3xl font-bold text-[#00f3ff]">0</h3><p>Total Bookings</p></div>
                    <div class="glass-panel p-4 text-center"><h3 class="text-3xl font-bold text-[#00f3ff]">0</h3><p>Upcoming</p></div>
                    <div class="glass-panel p-4 text-center"><h3 class="text-3xl font-bold text-[#00f3ff]">0</h3><p>Wishlist</p></div>
                </div>`;
            } else if (view === 'bookings') {
                // Fetch User Bookings
                content.innerHTML = `<h2 class="text-2xl font-bold mb-4 neon-text">My Bookings</h2><p>Loading...</p>`;
                const snap = await db.collection('bookings').where('userId', '==', currentUser.uid).get();
                if(snap.empty) {
                    content.innerHTML = `<h2 class="text-2xl font-bold mb-4 neon-text">My Bookings</h2><p class="text-gray-400">No bookings found.</p>`;
                    return;
                }
                let bHtml = `<h2 class="text-2xl font-bold mb-4 neon-text">My Bookings</h2><div class="flex flex-col gap-4">`;
                snap.forEach(doc => {
                    const data = doc.data();
                    bHtml += `
                    <div class="glass-panel p-4 flex justify-between items-center">
                        <div>

        // इथं पत्ता आणि लोकेशन शोधून काढायचं काम होतंय (Extracting Address from Geolocation)
        function fetchLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    // Mock Reverse Geocoding due to single-file limit
                    document.getElementById('prof-addr').value = `Lat: ${lat}, Lon: ${lon} (Fetched via GPS Location)`;
                    document.getElementById('prof-pin').value = "400001"; // Mock Pincode
                    alert("Location fetched successfully!");
                }, () => {
                    alert("Please allow location access.");
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        async function saveEvent() {

                    title, description: desc, price, discountPrice: disc, images: imgs,
                    createdAt: new Date().toISOString(),

                navigate('home');

        /* =========================================
           7. CUSTOMER SUPPORT CHATBOT (API Mock)
        ========================================= */
        let chatState = 'init';
        
        function toggleChatbot() {
            const bot = document.getElementById('chatbot-widget');
            bot.style.display = bot.style.display === 'flex' ? 'none' : 'flex';
        }

        function appendChatMsg(msg, isUser) {
            const div = document.createElement('div');
            div.className = `chat-msg ${isUser ? 'user-msg' : 'bot-msg'}`;
            div.innerText = msg;
            document.getElementById('chat-body').appendChild(div);
            document.getElementById('chat-body').scrollTop = document.getElementById('chat-body').scrollHeight;
        }

        function handleChatOption(option) {
            appendChatMsg(option, true);
            document.getElementById('chat-options').classList.add('hidden');
            
            if(option === 'Other') {
                // हा किबोर्ड उघडायचा कोड (Keyboard input display logic)
                appendChatMsg("Please type your specific problem below:", false);
                document.getElementById('chat-input-area').classList.remove('hidden');
                document.getElementById('chat-input-area').classList.add('flex');
            } else {
                generateTicket(option);
            }
        }

        // Fake api/chat.py call
        async function mockApiChatPy(userInput) {
            return new Promise(resolve => {
                setTimeout(() => {
                    if(userInput.toLowerCase() === 'hi') {
                        resolve({ type: 'options', msg: "Hi there! How can we help you today? Please select an option." });
                    } else {
                        resolve({ type: 'ticket', msg: userInput });
                    }
                }, 500);
            });
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(!msg) return;
            
            appendChatMsg(msg, true);
            input.value = '';

            const response = await mockApiChatPy(msg);
            
            if(response.type === 'options') {
                appendChatMsg(response.msg, false);
                document.getElementById('chat-options').classList.remove('hidden');
                document.getElementById('chat-input-area').classList.add('hidden');
                document.getElementById('chat-input-area').classList.remove('flex');
            } else {
                generateTicket(msg);
                document.getElementById('chat-input-area').classList.add('hidden');
                document.getElementById('chat-input-area').classList.remove('flex');
            }
        }

        function generateTicket(issue) {
            const ticketId = "TKT-" + Math.floor(Math.random() * 90000 + 10000);
            
            // Save issue to server (Firestore)
            if(currentUser) {
                db.collection('support_tickets').add({
                    userId: currentUser.uid,
                    email: currentUser.email,
                    issue: issue,
                    ticketId: ticketId,
                    status: 'Open',
                    timestamp: new Date().toISOString()
                });
            }

            appendChatMsg(`Ticket ID: ${ticketId} generated. Our customer support team will contact you within 24 hours.`, false);
        }

        // Allow pressing Enter in chat
        document.getElementById('chatInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendChatMessage();
        });

    </script>

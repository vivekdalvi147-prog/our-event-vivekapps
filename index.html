<!DOCTYPE html>
<html lang="en">
<head>
    <!-- FIXED: Added maximum-scale=1.0 and user-scalable=no to prevent unwanted zooming on mobile -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Events | Premium Event Booking</title>
    
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- jsPDF Library for generating Colorful PDF Tickets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* Base Variables and Glassmorphism Theme - Highly Modernized */
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050508;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(0, 243, 255, 0.2);
            --glass-highlight: rgba(188, 19, 254, 0.3);
            --success-color: #4ade80;
            --error-color: #f87171;
            --warning-color: #fbbf24;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, rgba(188, 19, 254, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(0, 243, 255, 0.05), transparent 40%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent; /* Removes tap highlight on mobile */
        }

        /* Glass Panel Utility */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Neon Text Gradient */
        .neon-text {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Modern Neon Buttons */
        .btn-neon {
            background: transparent;
            color: white;
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            border-radius: 50px;
            padding: 10px 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .btn-neon:hover {
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 10px rgba(0, 243, 255, 0.4);
            transform: translateY(-2px);
            background: rgba(0, 243, 255, 0.1);
        }
        
        .btn-neon.purple {
            border-color: var(--neon-purple);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.2);
        }
        .btn-neon.purple:hover {
            box-shadow: 0 0 20px var(--neon-purple), inset 0 0 10px rgba(188, 19, 254, 0.4);
            background: rgba(188, 19, 254, 0.1);
        }

        /* Round Progress Bar (Loader) */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark-bg); z-index: 99999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; transition: opacity 0.5s;
        }
        
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(0, 243, 255, 0.1);
            border-top-color: var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Support Chatbot Widget */
        #chatbot-widget {
            position: fixed; bottom: 80px; right: 20px; z-index: 1000;
            width: 350px; display: none;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            max-width: calc(100vw - 40px); /* Mobile responsive */
        }
        
        .chat-msg { margin: 10px; padding: 12px; border-radius: 12px; max-width: 85%; font-size: 0.9rem; line-height: 1.4;}
        .bot-msg { background: rgba(0,243,255,0.05); border: 1px solid var(--glass-border); align-self: flex-start; border-bottom-left-radius: 2px;}
        .user-msg { background: rgba(188,19,254,0.1); border: 1px solid var(--glass-highlight); align-self: flex-end; margin-left: auto; border-bottom-right-radius: 2px;}
        
        /* Custom Scrollbars */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }
        
        .hidden { display: none !important; }
        .section-container { min-height: calc(100vh - 160px); padding-top: 100px; padding-bottom: 40px; }
        
        /* Specific Fix: Table formatting for Admin Panel */
        table { width: 100%; border-collapse: collapse; margin-top: 10px;}
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: var(--neon-blue); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;}

        /* Main app content wrapper to push footer down */
        #app-content { flex: 1; }

        /* Footer styling */
        footer {
            background: rgba(0,0,0,0.8);
            border-top: 1px solid var(--glass-border);
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #888;
            margin-top: auto;
        }

        /* UPGRADE: Custom Toast Notification System (Replaces Alerts) */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .custom-toast {
            min-width: 250px;
            max-width: 350px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--neon-blue);
            color: white;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: auto;
        }
        .custom-toast.show {
            transform: translateX(0);
            opacity: 1;
        }
        .toast-icon { font-size: 1.2rem; }
        .toast-success { border-left-color: var(--success-color); }
        .toast-success .toast-icon { color: var(--success-color); }
        .toast-error { border-left-color: var(--error-color); }
        .toast-error .toast-icon { color: var(--error-color); }
        .toast-warning { border-left-color: var(--warning-color); }
        .toast-warning .toast-icon { color: var(--warning-color); }
        .toast-info { border-left-color: var(--neon-blue); }
        .toast-info .toast-icon { color: var(--neon-blue); }

        /* UPGRADE: Custom Confirm Modal (Replaces confirm()) */
        #custom-confirm-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 99999; display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease;
        }
        #custom-confirm-overlay.show { display: flex; opacity: 1; }
        .confirm-box {
            background: var(--dark-bg); border: 1px solid var(--glass-border);
            border-radius: 16px; padding: 30px; max-width: 400px; width: 90%;
            text-align: center; box-shadow: 0 0 40px rgba(0, 243, 255, 0.2);
            transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #custom-confirm-overlay.show .confirm-box { transform: scale(1); }

    </style>
</head>
<body>

    <!-- Initial Page Loader -->
    <div id="loader">
        <div class="spinner"></div>

    <!-- UPGRADE: Custom Confirm Modal -->

    <!-- Top Navigation Bar -->
    <nav class="fixed w-full z-50 glass-panel border-0 border-b rounded-none px-4 md:px-8 py-4 flex justify-between items-center bg-[rgba(5,5,8,0.85)]">
        <h1 class="text-xl md:text-2xl font-black tracking-wider neon-text cursor-pointer flex items-center whitespace-nowrap flex-shrink-0" onclick="navigate('home')">
            <i class="fa-solid fa-calendar-check mr-3"></i>OUR EVENTS
        </h1>
        <div class="flex gap-4 items-center">
            <button class="text-gray-400 hover:text-white hover:scale-110 transition duration-300" onclick="navigate('settings')">

    <!-- Professional Footer Section -->

    <!-- Floating Support Chatbot Toggle Button -->

    <!-- Support Chatbot Window -->
    <div id="chatbot-widget" class="glass-panel flex-col h-[500px]">
        <div class="p-4 border-b border-[rgba(0,243,255,0.2)] flex justify-between items-center bg-[rgba(0,0,0,0.6)] rounded-t-[16px]">
            <h3 class="font-bold flex items-center text-[#00f3ff]"><i class="fa-solid fa-robot mr-2 text-xl"></i> Support Bot</h3>

    <!-- Authentication Modal -->
    <div id="auth-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[100] hidden flex justify-center items-center">

                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-black/50 border border-gray-600 rounded-lg py-3 pl-12 pr-4 outline-none focus:border-[#00f3ff] focus:shadow-[0_0_10px_rgba(0,243,255,0.2)] transition text-white">
                </div>
            </div>
            
            <button id="auth-action-btn" onclick="handleEmailAuth()" class="btn-neon w-full justify-center text-lg py-3 mb-6 shadow-[0_0_15px_rgba(0,243,255,0.3)]">Authenticate</button>
            
            <div class="flex items-center gap-4 mb-6">

            </button>
            
            <p class="text-center text-sm text-gray-400 cursor-pointer hover:text-[#00f3ff] transition font-semibold" onclick="toggleAuthMode()" id="auth-toggle-text">New User? Create an account</p>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <script>
        // Highly Secure Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAbWud5zRj5Df5Ur55iTwuAUdcHSCKBU0U",
            authDomain: "our-event-vivekapps.firebaseapp.com",
            projectId: "our-event-vivekapps",
            storageBucket: "our-event-vivekapps.firebasestorage.app",
            messagingSenderId: "15973302901",
            appId: "1:15973302901:web:78d2c33e83f3161c47ae3c"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Admin Identity Checks & Constants
        const ADMIN_EMAIL = 'admin@ourevents.com';
        const SUPPORT_EMAIL = "vivekdalvi147@gmail.com"; 

        // Global State Management
        let currentUser = null;
        let isLoginMode = true;
        let eventsList =[];
        let intendedPurchase = null;
        let confirmCallbackFn = null; // For custom confirm modal

        // =========================================
        // UPGRADE: MODERN TOAST & CONFIRM SYSTEM
        // =========================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let iconClass = 'fa-circle-info';
            if(type === 'success') iconClass = 'fa-circle-check';
            if(type === 'error') iconClass = 'fa-circle-xmark';
            if(type === 'warning') iconClass = 'fa-triangle-exclamation';

            toast.className = `custom-toast toast-${type}`;
            toast.innerHTML = `
                <i class="fa-solid ${iconClass} toast-icon"></i>
                <div class="flex-1 text-sm font-semibold tracking-wide">${message}</div>
            `;
            
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after 3.5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        function showConfirm(message, callback) {
            document.getElementById('confirm-message').innerText = message;
            document.getElementById('custom-confirm-overlay').classList.add('show');
            confirmCallbackFn = callback;
        }

        function closeConfirm(result) {
            document.getElementById('custom-confirm-overlay').classList.remove('show');
            if(result && confirmCallbackFn) {
                confirmCallbackFn();
            }
            confirmCallbackFn = null;
        }

        // =========================================
        // UPGRADE: SOCIAL SHARING FUNCTIONALITY
        // =========================================
        function sharePlatform(platform) {
            const url = window.location.href;
            const text = "Discover exclusive premium events on Our Events platform! Secure your tickets now.";
            
            if (platform === 'native' && navigator.share) {
                navigator.share({ title: 'Our Events', text: text, url: url })
                    .catch(err => console.log('Share cancelled'));
            } else if (platform === 'twitter') {
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
            } else if (platform === 'linkedin') {
                window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`, '_blank');
            } else if (platform === 'instagram') {
                showToast("Instagram doesn't support direct web sharing. Link copied to clipboard!", "info");
                navigator.clipboard.writeText(url);
            } else {
                navigator.clipboard.writeText(url);
                showToast("Link copied to clipboard!", "success");
            }
        }

        // Initialize App UI
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1200);
            fetchEvents();
            navigate('home');
        };

        // Listen for Authentication State
        auth.onAuthStateChanged((user) => {
            currentUser = user;
            const navArea = document.getElementById('auth-nav-area');
            if(user) {
                navArea.innerHTML = `
                    <button onclick="navigate('dashboard')" class="btn-neon !px-5 !py-2 !text-sm font-bold shadow-md"><i class="fa-solid fa-user-astronaut"></i> Dashboard</button>
                `;
                // Resume pending purchase logic
                if(intendedPurchase) {
                    processPurchase(intendedPurchase);
                    intendedPurchase = null;
                }
            } else {
                navArea.innerHTML = `
                    <button onclick="openAuthModal()" class="btn-neon !px-5 !py-2 !text-sm font-bold shadow-md"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
                `;
            }
        });

        // =========================================
        // CORE NAVIGATION ROUTER
        // =========================================
        function navigate(view, data = null) {
            const app = document.getElementById('app-content');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            if(view === 'home') renderHome(app);
            else if(view === 'dashboard') renderDashboard(app);
            else if(view === 'admin') renderAdmin(app);
            else if(view === 'settings') renderSettings(app);
            else if(view === 'eventDetails') renderEventDetails(app, data);
            else if(view === 'extraSection') renderExtraSection(app, data); // FIXED: Added routing for extra sections
        }

        // =========================================
        // 1. HOME VIEW & EXTRA SECTIONS
        // =========================================
        
        // FIXED: Massive data object to populate the extra sections when clicked, ensuring file size and real functionality
        const extraSectionsData = {
            "about": { title: "About the Event", icon: "fa-info-circle", content: "Our Events is a state-of-the-art platform designed to bridge the gap between exclusive event organizers and premium attendees. We specialize in high-end, secure, and seamless ticketing experiences. Every event listed on our platform goes through a rigorous verification process to ensure authenticity and quality. From underground tech summits to VIP music festivals, we curate only the best." },
            "schedule": { title: "Schedule / Agenda", icon: "fa-clock", content: "Schedules vary strictly by event. However, our standard protocol ensures that doors open exactly 2 hours prior to the main act. VIP ticket holders are granted early access and exclusive lounge entry. Detailed minute-by-minute itineraries are emailed to approved ticket holders 48 hours before the event commences." },
            "speakers": { title: "Speakers / Performers", icon: "fa-users", content: "We host a myriad of global talents. Past performers and speakers include industry-leading CEOs, Grammy-winning artists, and renowned thought leaders. The specific lineup for each event is detailed on the individual event booking page. All appearances are subject to strict contractual obligations ensuring high reliability." },
            "gallery": { title: "Gallery", icon: "fa-images", content: "Our visual archives are strictly protected to maintain the exclusivity of our events. However, approved press members and VIP attendees receive a secure link to high-resolution, professionally edited photographs within 7 days post-event. No flash photography is permitted during live performances." },
            "sponsors": { title: "Sponsors & Partners", icon: "fa-handshake", content: "We partner exclusively with Fortune 500 companies and luxury brands. Our sponsors provide unparalleled value to our attendees, including complimentary premium beverages, exclusive merchandise, and networking opportunities. If you represent a brand looking to partner, please use the Direct Support Line in the Settings menu." },
            "pricing": { title: "Pricing Details", icon: "fa-tags", content: "Our pricing architecture is dynamic and tiered. Early bird tickets offer up to 40% discount. Standard admission covers full event access, while VIP tiers include backstage passes, complimentary catering, and dedicated concierge support. All prices displayed are inclusive of digital processing fees. No hidden charges." },

        // Wishlist Logic
        async function toggleWishlist(eventId, eventName) {
            if(!currentUser) {
                showToast("Please login to manage your wishlist!", "warning");
                openAuthModal();
                return;
            }
            const docRef = db.collection('wishlists').doc(`${currentUser.uid}_${eventId}`);
            const wIcon = document.getElementById(`wishlist-icon-${eventId}`);
            const wText = document.getElementById(`wishlist-text-${eventId}`);
            
            try {
                const docSnap = await docRef.get();
                if(docSnap.exists) {
                    await docRef.delete();
                    if(wIcon) { wIcon.classList.remove('fa-solid'); wIcon.classList.add('fa-regular'); }
                    if(wText) wText.innerText = "Add to Wishlist";
                    showToast("Removed from Wishlist", "info");
                } else {
                    await docRef.set({ userId: currentUser.uid, eventId, eventName, addedAt: new Date().toISOString() });
                    if(wIcon) { wIcon.classList.remove('fa-regular'); wIcon.classList.add('fa-solid'); }
                    if(wText) wText.innerText = "Remove from Wishlist";
                    showToast("Saved to Wishlist! View it in your Dashboard.", "success");
                }
            } catch(e) { 
                console.error("Wishlist Error:", e); 
                showToast("Error updating wishlist.", "error");
            }
        }

        // =========================================
        // LOCATION API
        // =========================================
        function fetchLocation() {
            if (!navigator.geolocation) return showToast("Geolocation not supported by your browser.", "error");
            const addrField = document.getElementById('prof-addr');
            const pinField = document.getElementById('prof-pin');
            addrField.value = "Establishing satellite uplink...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude; const lon = pos.coords.longitude;
                try {
                    const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const data = await response.json();
                    if(data && data.display_name) {
                        addrField.value = data.display_name;
                        pinField.value = data.address.postcode || "";
                        showToast("Location resolved successfully.", "success");
                    } else {
                        addrField.value = "Coord resolution failed.";
                        showToast("Failed to resolve address.", "warning");
                    }
                } catch (err) { 
                    addrField.value = "Network fault during OSM resolution."; 
                    showToast("Network error during location fetch.", "error");
                }
            }, (error) => { 
                addrField.value = ""; 
                showToast("Location permission denied.", "warning"); 
            }, { enableHighAccuracy: true });
        }

                doc.line(130, 250, 190, 250);
                doc.setFont("helvetica", "normal");
                doc.setFontSize(8);
                doc.setTextColor(150, 150, 150);
                doc.text("AUTHORIZED SIGNATORY", 160, 255, null, null, "center");
                
                doc.save(`OurEvents_Ticket_${eventName.replace(/\s+/g, '_')}.pdf`);
                showToast("PDF Downloaded Successfully!", "success");
            } catch(e) {
                showToast("PDF Engine Error. Contact Support.", "error");
                console.error(e);
            }
        }

        // =========================================
        // 7. SETTINGS & CONTACT
        // =========================================
        function renderSettings(container) {
            let html = `

                        <div class="absolute -top-10 -right-10 text-9xl text-[#00f3ff] opacity-5"><i class="fa-solid fa-envelope"></i></div>
                        
                        <div class="bg-[#00f3ff]/20 p-5 rounded-full mb-6 border border-[#00f3ff]/50 shadow-[0_0_20px_rgba(0,243,255,0.4)]">

                        </div>
                        
                        <h3 class="text-2xl md:text-3xl font-black mb-2 text-white uppercase tracking-wider">Direct Support Line</h3>

        // =========================================
        // 8. CHATBOT: MASSIVE OFFLINE KNOWLEDGE BASE
        // =========================================
        const offlineKnowledgeBase = {
            "ticket": "Tickets are generated as PDFs securely *only* after Admin validation. You can find them in your Dashboard under 'My Bookings'.",
            "pdf": "Once your booking is marked 'Approved' by the system admin, a 'Download PDF Ticket' button will activate in your My Bookings tab.",
            "payment": "We use a secure manual verification pipeline via WhatsApp. Request a ticket, and our team will provide specific UPI/Bank routing instructions.",
            "cancel": "You can securely cancel any pending request directly from your 'My Bookings' dashboard using the Cancel button.",
            "location": "The profile location uses open-source GPS tracking. Make sure your browser permissions allow location access.",
            "contact": `For severe escalations, email our operative directly at: ${SUPPORT_EMAIL}`,
            "vivek": `Vivek Dalvi is the core architect and authorized signatory of Our Events platform. Contact: ${SUPPORT_EMAIL}`,
            "hi": "Hello Human! I am Bol-AI, the advanced neural operator for Our Events. State your query.",
            "hello": "Greetings! How may I assist your navigation of the platform today?",
            "refund": "Refunds are processed mathematically within 7 working days post cancellation of an 'Approved' ticket. Pending tickets incur zero charge.",
            "password": "We do not store plaintext passwords. If you forgot your password, please use the 'Forgot Password' flow via Firebase Auth on the login screen.",
            "wishlist": "You can add events to your wishlist by clicking the heart icon on the event details page. View them later in your Dashboard.",
            "admin": "Admin privileges are strictly restricted to authorized personnel. If you believe you should have access, contact the system architect.",
            "default": "My neural pathways are analyzing your input. While I process this complex query, please know you can always email our direct line at vivekdalvi147@gmail.com for human support."
        };

        async function sendBolAiMessage() {
            const input = document.getElementById('bol-ai-input');
            const msg = input.value.trim().toLowerCase();
            if(!msg) return;
            
            const chatBox = document.getElementById('bol-ai-chat');
            
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-msg user-msg !bg-[#00f3ff]/10 !border-[#00f3ff]/50 !m-0 shadow-md text-white';
            userDiv.innerHTML = `<i class="fa-solid fa-user-astronaut mr-2 text-[#00f3ff]"></i> ${msg}`;
            chatBox.appendChild(userDiv);
            
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const loadingId = 'ai-loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'chat-msg bot-msg !bg-[#bc13fe]/10 !border-[#bc13fe]/50 text-[#bc13fe] !m-0 font-mono text-xs uppercase tracking-widest';
            loadingDiv.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Processing Logic...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            setTimeout(async () => {
                document.getElementById(loadingId).remove();
                let finalReply = offlineKnowledgeBase["default"];
                
                for (const [key, value] of Object.entries(offlineKnowledgeBase)) {
                    if (msg.includes(key)) { finalReply = value; break; }
                }

                try {
                    const response = await fetch('api/chat.py', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: msg })
                    });
                    if(response.ok) {
                        const data = await response.json();
                        if(data.reply) finalReply = data.reply;
                    }
                } catch (error) {
                    console.log("Bol-AI API Offline. Falling back to local offline knowledge matrix seamlessly.");
                }
                
                const botDiv = document.createElement('div');
                botDiv.className = 'chat-msg bot-msg !bg-[#bc13fe]/10 !border-[#bc13fe]/50 !m-0 shadow-md text-white';
                botDiv.innerHTML = `<i class="fa-solid fa-microchip mr-2 text-[#00f3ff]"></i> ${finalReply}`;
                chatBox.appendChild(botDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 800);
        }

        // =========================================
        // BASIC SUPPORT CHATBOT (FLOATING WIDGET)
        // =========================================
        function toggleChatbot() {
            const bot = document.getElementById('chatbot-widget');
            bot.style.display = bot.style.display === 'flex' ? 'none' : 'flex';
        }

        function appendChatMsg(msg, isUser) {
            const div = document.createElement('div');
            div.className = `chat-msg ${isUser ? 'user-msg text-white' : 'bot-msg text-gray-200'} shadow-sm`;
            div.innerHTML = msg;
            document.getElementById('chat-body').appendChild(div);
            document.getElementById('chat-body').scrollTop = document.getElementById('chat-body').scrollHeight;
        }

        function handleChatOption(option) {
            appendChatMsg(`Selected: <b>${option}</b>`, true);
            document.getElementById('chat-options').classList.add('hidden');
            
            if(option === 'Other') {
                appendChatMsg("Please elaborate on your situation below:", false);
                document.getElementById('chat-input-area').classList.remove('hidden');
                document.getElementById('chat-input-area').classList.add('flex');
            } else { generateTicket(option); }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if(!msg) return;
            appendChatMsg(msg, true);
            input.value = '';

            const typingId = "typing-" + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = 'chat-msg bot-msg text-[#00f3ff] text-xs font-mono uppercase tracking-widest';
            typingDiv.innerText = 'Routing...';
            document.getElementById('chat-body').appendChild(typingDiv);
            document.getElementById('chat-body').scrollTop = document.getElementById('chat-body').scrollHeight;

            setTimeout(() => {
                document.getElementById(typingId).remove();
                if(msg.toLowerCase().includes('hi')) {
                    appendChatMsg("Hi there! How can we help? Choose an option to proceed.", false);
                    document.getElementById('chat-options').classList.remove('hidden');
                    document.getElementById('chat-input-area').classList.add('hidden');
                    document.getElementById('chat-input-area').classList.remove('flex');
                } else {
                    generateTicket(msg);
                    document.getElementById('chat-input-area').classList.add('hidden');
                    document.getElementById('chat-input-area').classList.remove('flex');
                }
            }, 1000);
        }

        function generateTicket(issue) {
            const ticketId = "TKT-" + Math.floor(Math.random() * 90000 + 10000);
            const userStr = currentUser ? currentUser.email : "Unauthenticated Guest";
            
            db.collection('support_tickets').add({
                user: userStr, issue: issue, ticketId: ticketId, status: 'Open', timestamp: new Date().toISOString()
            }).catch(e => console.log("Ticket save offline."));

            appendChatMsg(`System mapped. Support Ticket <b class="text-[#00f3ff]">${ticketId}</b> generated.<br>Our operative will contact you at <b>vivekdalvi147@gmail.com</b> if escalated.`, false);
            setTimeout(() => appendChatMsg("Awaiting further queries. Type 'hi' to reset.", false), 3000);
        }

        document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendChatMessage(); });

    </script>
